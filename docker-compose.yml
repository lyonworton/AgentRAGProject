version: "3.8"
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: agentrag
      POSTGRES_USER: agentrag
      POSTGRES_PASSWORD: agentrag
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /data --console-address ":9001"

  milvus:
    image: milvusdb/milvus:v2.4.0
    ports: ["19530:19530", "9091:9091"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    depends_on: [etcd, minio]
    command: milvus run standalone

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  fastapi:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://agentrag:agentrag@postgres:5432/agentrag
      MILVUS_HOST: milvus
      REDIS_URL: redis://redis:6379/0
    depends_on: [postgres, milvus, redis]
    volumes: ["./uploads:/app/uploads"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  arq-worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://agentrag:agentrag@postgres:5432/agentrag
      MILVUS_HOST: milvus
      REDIS_URL: redis://redis:6379/0
    depends_on: [postgres, milvus, redis]
    command: arq app.workers.main.WorkerSettings

volumes:
  pgdata:
  minio_data: