version: "3.8"
services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: agentrag
      POSTGRES_USER: agentrag
      POSTGRES_PASSWORD: agentrag
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    environment:
      ETCD_AUTO_COMPACTION_MODE: revision
      ETCD_AUTO_COMPACTION_RETENTION: "1000"
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    command: minio server /data --console-address ":9001"

  milvus:
    image: milvusdb/milvus:v2.4.0
    ports: ["19530:19530", "9091:9091"]
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    depends_on: [etcd, minio]
    command: milvus run standalone

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  fastapi:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://agentrag:agentrag@postgres:5432/agentrag
      MILVUS_HOST: milvus
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      ES_HOST: http://elasticsearch:9200
      HF_HOME: /app/models
      RERANKER_MODEL: /app/models/BAAI/bge-reranker-v2-m3
      TRANSFORMERS_OFFLINE: "1"
    mem_limit: 3g
    depends_on:
      postgres:
        condition: service_started
      milvus:
        condition: service_started
      redis:
        condition: service_started
      neo4j:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    volumes: ["./uploads:/app/uploads", "D:/models:/app/models"]
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  arq-worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://agentrag:agentrag@postgres:5432/agentrag
      MILVUS_HOST: milvus
      REDIS_URL: redis://redis:6379/0
      NEO4J_URI: bolt://neo4j:7687
      ES_HOST: http://elasticsearch:9200
      HF_HOME: /app/models
      RERANKER_MODEL: /app/models/BAAI/bge-reranker-v2-m3
      TRANSFORMERS_OFFLINE: "1"
    volumes: ["./uploads:/app/uploads", "D:/models:/app/models"]
    restart: always
    depends_on:
      postgres:
        condition: service_started
      milvus:
        condition: service_started
      redis:
        condition: service_started
      neo4j:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    command: arq app.workers.main.WorkerSettings

  xinference:
    image: xorbitsai/xinference:latest
    ports: ["9997:9997"]
    environment:
      - XINFERENCE_HOME=/root/.xinference
    volumes:
      - xinference_models:/root/.xinference/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    restart: unless-stopped

  # === Phase 2 (Phase 5 enabled) ===
  neo4j:
    image: neo4j:5
    ports: ["7474:7474", "7687:7687"]
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-agentrag123}
    volumes: [neo4jdata:/data]
    healthcheck:
      test: ["CMD-SHELL", "echo 'RETURN 1' | cypher-shell -u neo4j -p $${NEO4J_PASSWORD:-agentrag123} || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  elasticsearch:
    build:
      context: .
      dockerfile: Dockerfile.es
    ports: ["9200:9200"]
    environment:
      discovery.type: single-node
      xpack.security.enabled: false
      ES_JAVA_OPTS: -Xms512m -Xmx512m
    volumes: [esdata:/usr/share/elasticsearch/data]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -q 'green\\|yellow' || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  # === Phase 3 ===
  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    depends_on: [fastapi]

volumes:
  pgdata:
  minio_data:
  neo4jdata:
  esdata:
  xinference_models: